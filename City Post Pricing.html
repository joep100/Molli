<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CityPost — Hero Motion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; overflow: hidden; }
    body { font-family: "Inter Tight", -apple-system, sans-serif; color: #fff; }
    #root { position: fixed; inset: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="artboards/shared-content.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="animations.jsx"></script>
  <script type="text/babel" src="artboards/sprint-theme.jsx"></script>
  <script type="text/babel" src="artboards/sprint-motion.jsx"></script>

  <script type="text/babel" data-presets="react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "#7FE001"
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      return (
        <React.Fragment>
          <window.SprintMotion accent={t.accent} />
          <TweaksPanel>
            <TweakSection label="Accent color" />
            <TweakColor
              label="Accent"
              value={t.accent}
              options={['#9CFF2E', '#5CB308', '#7FE001', '#00FF87', '#C4FF00']}
              onChange={(v) => setTweak('accent', v)} />
          </TweaksPanel>
        </React.Fragment>
      );
    }

    function mount() {
      if (window.SprintMotion && window.TweaksPanel && window.useTweaks && window.CityPostBrand && window.Stage) {
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
      } else {
        setTimeout(mount, 50);
      }
    }
    mount();
  </script>
</body>
</html>
