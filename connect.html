<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Molli — Mono compare: dark vs light</title>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'Inter Tight', sans-serif; background: #26262b; color: #fff; display: flex; flex-direction: column; }
  .bar {
    display: flex; align-items: center; gap: 14px; padding: 12px 20px;
    border-bottom: 1px solid rgba(255,255,255,.1); flex: none;
  }
  .bar .title { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
  .bar .note { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #9a9aa2; }
  .bar .sync { margin-left: auto; display: flex; align-items: center; gap: 7px; font-size: 12px; color: #c2c2c8; cursor: pointer; }
  .bar .sync input { accent-color: #3D8BFF; width: 15px; height: 15px; }
  .cols { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: rgba(255,255,255,.1); min-height: 0; }
  .col { display: flex; flex-direction: column; min-height: 0; background: #000; }
  .col .lbl {
    flex: none; padding: 9px 16px; font-family: 'JetBrains Mono', monospace; font-size: 11px;
    font-weight: 700; letter-spacing: .04em; display: flex; align-items: center; gap: 9px;
  }
  .col .lbl .sw { width: 11px; height: 11px; border-radius: 3px; }
  .col.dark .lbl { background: #0a0a0a; color: #fff; }
  .col.light .lbl { background: #fff; color: #14181a; }
  .col iframe { flex: 1; width: 100%; border: 0; background: #fff; }
</style>
</head>
<body>
  <div class="bar">
    <div class="title">Mono + Signal blue</div>
    <div class="note">dark vs light · scroll either panel</div>
    <label class="sync"><input type="checkbox" id="syncScroll" checked> Sync scroll</label>
  </div>
  <div class="cols">
    <div class="col dark">
      <div class="lbl"><span class="sw" style="background:#0a0a0a;border:1px solid #333"></span> 01 · Dark — white on black</div>
      <iframe id="fDark" src="index-mono-dark.html"></iframe>
    </div>
    <div class="col light">
      <div class="lbl"><span class="sw" style="background:#fff;border:1px solid #ccc"></span> 02 · Light — dark on white</div>
      <iframe id="fLight" src="index-mono.html"></iframe>
    </div>
  </div>

<script>
  // Sync scrolling between the two iframes.
  var a = document.getElementById('fDark');
  var b = document.getElementById('fLight');
  var sync = document.getElementById('syncScroll');
  var lock = false;
  function link(from, to) {
    try {
      from.contentWindow.addEventListener('scroll', function () {
        if (!sync.checked || lock) return;
        lock = true;
        to.contentWindow.scrollTo(0, from.contentWindow.scrollY);
        requestAnimationFrame(function () { lock = false; });
      }, { passive: true });
    } catch (e) {}
  }
  var ready = 0;
  function onReady() {
    ready++;
    if (ready === 2) { link(a, b); link(b, a); }
  }
  a.addEventListener('load', onReady);
  b.addEventListener('load', onReady);
</script>
</body>
</html>
